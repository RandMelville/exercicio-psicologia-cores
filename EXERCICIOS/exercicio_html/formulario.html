<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Formulário de registro</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="#form">Contato</a></li>
            <li><a href="#sobre">Sobre</a></li>
        </ul>
    </nav>
    
    <main>
        <section id="sobre">
            <article>
                <h2>Sobre esta página</h2>
                <p>Esta página usa elementos semânticos para melhor estruturação e acessibilidade.</p>
            </article>
        </section>
        
        <section id="form">
            <h2>Formulário de Contato</h2>
            <form id="formulario">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
                
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2025 Minha Página Semântica</p>
    </footer>

    <script>
        // Limpar os campos ao enviar
        document.getElementById('formulario').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o envio do formulário
            document.getElementById('formulario').reset(); // Limpa os campos
        });
    </script>
</body>
</html>
