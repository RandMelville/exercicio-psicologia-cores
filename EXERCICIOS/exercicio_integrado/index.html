<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Exercício 1: Página Interativa de Tarefas com Cores Estratégicas -->
    <h1>Minha lista de Tarefas</h1>

    <!-- Campo de Entrada e Botão -->
    <div class="input-container">
        <input type="text" id="tarefaInput" placeholder="Adicione uma tarefa" />
        <button id="adicionarTarefa" onclick="adicionarTarefa()">Adicionar tarefa</button>
    </div>

    <!-- Lista de Tarefas -->
    <ul id="listaTarefas">
        <!-- As tarefas serão adicionadas aqui -->
    </ul>

    <hr> <!-- Separador para os exercícios -->

    <!-- Exercício 2: Muda de Cor ao Clicar com Feedback Visual -->
    <h2>Texto que muda de cor</h2>
    <h1 id="texto">Texto inicial</h1>
    <button onclick="mudarCorTexto()">Mudar cor</button>

    <script src="script.js"></script>
</body>
</html>
