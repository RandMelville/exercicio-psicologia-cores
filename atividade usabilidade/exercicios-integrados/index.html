<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios Integrados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
    </header>

    <!-- Exercício 1: Página Interativa de Tarefas -->
    <section id="tarefas">
        <input type="text" id="campoTarefa" placeholder="Digite sua tarefa...">
        <button id="botaoAdicionar" onclick="adicionarTarefa()">Adicionar Tarefa</button>
        <ul id="listaTarefas"></ul>
    </section>

    <!-- Exercício 2: Muda de Cor ao Clicar -->
    <section id="mudaCor">
        <p id="texto">Clique no botão para mudar a cor do texto!</p>
        <button id="botaoCor" onclick="mudarCorTexto()">Mudar Cor</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
