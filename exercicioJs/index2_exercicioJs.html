<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Interativa</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- Título Dinâmico -->
    <section id="titulo-section">
        <h1 id="titulo">Clique no botão para mudar o título</h1>
        <button id="botaoMudarTitulo">Mudar Título</button>
    </section>

    <!-- Contagem Regressiva -->
    <section id="contador-section">
        <div id="contador">10</div>
        <div id="mensagem"></div>
    </section>

    <!-- Formulário de Login -->
    <section id="login-section">
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuário">
            <input type="password" id="senha" placeholder="Senha">
            <button type="submit">Entrar</button>
            <div id="erroMensagem" class="mensagem-erro"></div>
        </form>
    </section>

    <script src="main.js"></script>
</body>
</html>
